# Release-Pipeline (Übungsartefakt — enthält bewusste Schwachstellen)
name: release

on:
  pull_request_target:
    branches: [ main ]
  push:
    tags: [ 'v*' ]

permissions: write-all

env:
  DEPLOY_TOKEN: "dep_FAKEtokenDoNotUse_0000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        run: mvn -B clean verify
      - name: Deploy artifact
        run: |
          curl -sf -H "Authorization: Bearer $DEPLOY_TOKEN" \
            --data-binary @target/user-api-1.0.0-SNAPSHOT.jar \
            https://nexus.internal.example.com/repository/releases/
