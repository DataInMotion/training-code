# Deploy-Pipeline (Übungsartefakt — enthält bewusste Schwachstellen)
name: deploy

on:
  issues:
    types: [ opened ]
  push:
    branches: [ main ]

permissions: write-all

env:
  NPM_TOKEN: "npm_FAKEtokenDoNotUse"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Greet
        run: echo "Processing request: ${{ github.event.issue.title }}"
      - name: Install
        run: npm install
      - name: Build & publish
        run: |
          npm run build
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish
